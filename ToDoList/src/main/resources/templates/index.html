<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center">To-Do List Application</h2>

<a th:href="@{/addTask}" class="btn btn-primary mb-3">Add Task</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

<tr th:each="task : ${taskList}">

<td th:text="${task.id}"></td>

<td th:text="${task.title}"></td>

<td th:text="${task.description}"></td>

<td th:text="${task.status}"></td>

<td>

<a th:href="@{/editTask/{id}(id=${task.id})}" class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{/deleteTask/{id}(id=${task.id})}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
